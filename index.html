<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYNC | Operations</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <script src="https://bernardo-castilho.github.io/DragDropTouch/DragDropTouch.js"></script>
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { void: '#030303', chassis: '#0a0a0a', surface: '#121212' },
                    fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        /* Hide scrollbars for clean UI, but keep functionality */
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Clean Glass Textures */
        .glass-panel { background: rgba(18, 18, 18, 0.85); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .glass-card { background: #121212; border: 1px solid rgba(255, 255, 255, 0.08); transition: transform 0.2s ease, border-color 0.2s ease; }
        .glass-card:hover { border-color: rgba(255, 255, 255, 0.2); transform: translateY(-2px); }
        
        /* Drag and Drop Visuals */
        .dragging { opacity: 0.4; }
        .column-dropzone { min-height: 50vh; transition: background-color 0.2s ease; border-radius: 0.5rem; }
        .drag-over { background-color: rgba(255, 255, 255, 0.03); border: 1px dashed rgba(255, 255, 255, 0.2); }
        .drawer-open { transform: translateX(0%); }
    </style>
</head>
<body class="bg-void text-gray-300 h-screen w-screen overflow-hidden font-sans antialiased selection:bg-white selection:text-black flex flex-col">

    <div id="lockScreen" class="absolute inset-0 z-[100] bg-void flex flex-col items-center justify-center transition-opacity duration-500">
        <div class="text-center mb-10">
            <h1 class="text-3xl font-bold tracking-[0.2em] text-white uppercase">SYNC</h1>
            <p class="text-[10px] font-medium text-white/40 uppercase tracking-[0.3em] mt-2">Authorization Required</p>
        </div>

        <div class="glass-panel p-8 rounded-2xl w-80 shadow-2xl">
            <div class="flex justify-center gap-4 mb-8" id="pinDots">
                <div class="h-2 w-2 rounded-full bg-black border border-white/20 transition-colors duration-200" id="dot-1"></div>
                <div class="h-2 w-2 rounded-full bg-black border border-white/20 transition-colors duration-200" id="dot-2"></div>
                <div class="h-2 w-2 rounded-full bg-black border border-white/20 transition-colors duration-200" id="dot-3"></div>
                <div class="h-2 w-2 rounded-full bg-black border border-white/20 transition-colors duration-200" id="dot-4"></div>
            </div>
            
            <div class="grid grid-cols-3 gap-3" id="numpad">
                <button class="pin-btn h-14 bg-surface border border-white/5 rounded-xl text-lg font-medium text-white hover:bg-white/10 active:scale-95 transition-all" data-val="1">1</button>
                <button class="pin-btn h-14 bg-surface border border-white/5 rounded-xl text-lg font-medium text-white hover:bg-white/10 active:scale-95 transition-all" data-val="2">2</button>
                <button class="pin-btn h-14 bg-surface border border-white/5 rounded-xl text-lg font-medium text-white hover:bg-white/10 active:scale-95 transition-all" data-val="3">3</button>
                <button class="pin-btn h-14 bg-surface border border-white/5 rounded-xl text-lg font-medium text-white hover:bg-white/10 active:scale-95 transition-all" data-val="4">4</button>
                <button class="pin-btn h-14 bg-surface border border-white/5 rounded-xl text-lg font-medium text-white hover:bg-white/10 active:scale-95 transition-all" data-val="5">5</button>
                <button class="pin-btn h-14 bg-surface border border-white/5 rounded-xl text-lg font-medium text-white hover:bg-white/10 active:scale-95 transition-all" data-val="6">6</button>
                <button class="pin-btn h-14 bg-surface border border-white/5 rounded-xl text-lg font-medium text-white hover:bg-white/10 active:scale-95 transition-all" data-val="7">7</button>
                <button class="pin-btn h-14 bg-surface border border-white/5 rounded-xl text-lg font-medium text-white hover:bg-white/10 active:scale-95 transition-all" data-val="8">8</button>
                <button class="pin-btn h-14 bg-surface border border-white/5 rounded-xl text-lg font-medium text-white hover:bg-white/10 active:scale-95 transition-all" data-val="9">9</button>
                <button class="col-start-2 pin-btn h-14 bg-surface border border-white/5 rounded-xl text-lg font-medium text-white hover:bg-white/10 active:scale-95 transition-all" data-val="0">0</button>
                <button class="pin-clear h-14 bg-transparent text-[10px] font-bold text-white/40 hover:text-white uppercase tracking-widest active:scale-95 transition-all">CLR</button>
            </div>
            <p id="pinError" class="text-red-500 text-[10px] font-semibold tracking-wider uppercase text-center mt-6 h-4 opacity-0 transition-opacity">Access Denied</p>
        </div>
    </div>

    <header class="h-16 border-b border-white/10 flex items-center justify-between px-6 shrink-0 z-10 w-full bg-chassis">
        <div class="flex items-center gap-4">
            <h1 class="text-lg font-bold tracking-widest text-white uppercase">SYNC</h1>
        </div>
        <div class="flex justify-end items-center gap-3">
            <div class="text-right hidden sm:block">
                <p id="activeUserName" class="text-[11px] font-bold text-white tracking-wider uppercase">LOCKED</p>
                <p id="activeUserRole" class="text-[9px] text-white/40 uppercase tracking-widest">Awaiting Identity</p>
            </div>
            <div class="h-8 w-8 rounded-full border border-white/10 flex items-center justify-center text-xs text-white/60 bg-surface">
                <i class="fa-solid fa-user"></i>
            </div>
        </div>
    </header>

    <main class="flex-1 overflow-x-auto overflow-y-hidden p-6 scrollbar-hide snap-x snap-mandatory">
        <div class="flex flex-row gap-6 h-full items-start min-w-max">
            
            <div class="w-[85vw] sm:w-[320px] shrink-0 flex flex-col h-full snap-center">
                <div class="flex justify-between items-center mb-3 px-1">
                    <h3 class="font-semibold text-[11px] uppercase tracking-wider text-white/60">Radar</h3>
                    <span class="text-[10px] font-mono text-white/40 bg-surface border border-white/5 px-2 py-0.5 rounded" id="count-Radar">0</span>
                </div>
                <div class="flex-1 overflow-y-auto space-y-3 scrollbar-hide pb-40 column-dropzone" id="col-Radar" ondrop="drop(event, 'Radar')" ondragover="allowDrop(event)" ondragleave="dragLeave(event)"></div>
            </div>

            <div class="w-[85vw] sm:w-[320px] shrink-0 flex flex-col h-full snap-center">
                <div class="flex justify-between items-center mb-3 px-1">
                    <h3 class="font-semibold text-[11px] uppercase tracking-wider text-white">Assigned To</h3>
                    <span class="text-[10px] font-mono text-white bg-white/10 border border-white/10 px-2 py-0.5 rounded" id="count-Assigned To">0</span>
                </div>
                <div class="flex-1 overflow-y-auto space-y-3 scrollbar-hide pb-40 column-dropzone" id="col-Assigned To" ondrop="drop(event, 'Assigned To')" ondragover="allowDrop(event)" ondragleave="dragLeave(event)"></div>
            </div>

            <div class="w-[85vw] sm:w-[320px] shrink-0 flex flex-col h-full snap-center">
                <div class="flex justify-between items-center mb-3 px-1">
                    <h3 class="font-semibold text-[11px] uppercase tracking-wider text-white/60">In Progress</h3>
                    <span class="text-[10px] font-mono text-white/40 bg-surface border border-white/5 px-2 py-0.5 rounded" id="count-In Progress">0</span>
                </div>
                <div class="flex-1 overflow-y-auto space-y-3 scrollbar-hide pb-40 column-dropzone" id="col-In Progress" ondrop="drop(event, 'In Progress')" ondragover="allowDrop(event)" ondragleave="dragLeave(event)"></div>
            </div>

            <div class="w-[85vw] sm:w-[320px] shrink-0 flex flex-col h-full snap-center">
                <div class="flex justify-between items-center mb-3 px-1">
                    <h3 class="font-semibold text-[11px] uppercase tracking-wider text-white/40">Completed</h3>
                </div>
                <div class="flex-1 overflow-y-auto space-y-3 scrollbar-hide pb-40 column-dropzone opacity-60" id="col-Completed" ondrop="drop(event, 'Completed')" ondragover="allowDrop(event)" ondragleave="dragLeave(event)"></div>
            </div>

        </div>
    </main>
    <div id="shiftBlackout" class="fixed inset-0 z-[200] bg-void flex flex-col items-center justify-center opacity-0 pointer-events-none transition-opacity duration-1000">
        <h2 class="text-white text-2xl font-black tracking-[0.3em] uppercase">Syncing Shift</h2>
        <p class="text-white/40 text-[10px] tracking-widest mt-4">Purging Completed Data...</p>
    </div>

    <div id="toastAlert" class="fixed top-20 right-6 transform translate-x-[150%] transition-transform duration-300 ease-out glass-panel px-5 py-4 rounded-xl shadow-2xl z-[90] flex items-center gap-4 border-white/10">
        <i class="fa-solid fa-check text-white/60"></i>
        <div>
            <p class="text-[9px] font-bold uppercase tracking-widest text-white/50" id="toastHeader">System</p>
            <p id="toastMessage" class="text-xs font-medium text-white mt-0.5">Action Confirmed</p>
        </div>
    </div>

    <div id="peekDrawer" class="fixed top-0 right-0 h-full w-full sm:w-[400px] glass-panel border-l border-white/10 z-[80] transform translate-x-full transition-transform duration-300 ease-out flex flex-col shadow-2xl">
        <div class="p-6 border-b border-white/5 flex justify-between items-start bg-chassis">
            <div>
                <p id="peekEntity" class="text-[10px] text-white/50 font-mono mb-1">#Entity</p>
                <h2 id="peekTitle" class="text-lg font-semibold text-white leading-tight">Directive Title</h2>
            </div>
            <button onclick="closePeek()" class="text-white/40 hover:text-white transition-colors h-8 w-8 bg-surface rounded-full flex items-center justify-center border border-white/5 hover:bg-white/10"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="flex-1 p-6 flex flex-col gap-3">
            <label class="text-[10px] font-semibold tracking-wider text-white/50 uppercase">Notes</label>
            <textarea id="peekNotes" class="w-full flex-1 bg-surface border border-white/10 rounded-xl p-4 text-sm text-white outline-none focus:border-white/30 resize-none transition-colors leading-relaxed"></textarea>
            <button id="commitNoteBtn" class="bg-white/10 hover:bg-white/20 text-white border border-white/10 py-3.5 rounded-xl text-xs font-bold tracking-widest uppercase transition-all active:scale-95 mt-2">Save Note</button>
        </div>
        <div class="p-6 border-t border-white/5 bg-chassis">
            <button id="archiveBtn" class="w-full text-red-400 hover:text-red-500 hover:bg-red-500/10 py-3 rounded-xl text-xs font-bold tracking-widest uppercase transition-all border border-transparent hover:border-red-500/20 active:scale-95"><i class="fa-solid fa-trash-can mr-2"></i> Archive</button>
        </div>
    </div>

    <div class="fixed bottom-6 w-full px-4 sm:px-0 sm:w-auto sm:left-1/2 sm:-translate-x-1/2 z-[70]">
        <div class="glass-panel rounded-2xl sm:rounded-full p-2 flex flex-wrap sm:flex-nowrap items-center gap-2 shadow-2xl border-white/10 max-w-[500px] mx-auto sm:max-w-none">
            
            <div class="flex items-center bg-surface rounded-xl sm:rounded-full px-4 h-11 border border-white/5 flex-1 min-w-[140px] focus-within:border-white/20 transition-colors">
                <input type="text" id="pulseTitle" placeholder="Task title..." class="bg-transparent border-none text-white text-sm outline-none placeholder-white/30 w-full">
            </div>

            <div class="flex items-center bg-surface rounded-xl sm:rounded-full px-4 h-11 border border-white/5 w-[110px] focus-within:border-white/20 transition-colors">
                <input type="text" id="pulseTarget" list="rosterList" placeholder="Target..." class="bg-transparent border-none text-white text-sm outline-none placeholder-white/30 w-full">
                <datalist id="rosterList"></datalist>
            </div>
            
            <select id="pulseTL" class="h-11 bg-surface border border-white/5 rounded-xl sm:rounded-full px-3 text-xs outline-none text-white hover:border-white/20 appearance-none cursor-pointer w-[110px]">
                <option value="None">No TL</option>
            </select>

            <select id="pulsePriority" class="h-11 bg-surface border border-white/5 rounded-xl sm:rounded-full px-3 text-xs outline-none text-white hover:border-white/20 appearance-none cursor-pointer w-[90px]">
                <option value="Standard">Std</option>
                <option value="High" class="text-yellow-400">High</option>
                <option value="Critical" class="text-red-500">Crit</option>
            </select>

            <button id="executeBtn" class="h-11 px-6 rounded-xl sm:rounded-full bg-white text-black text-xs font-bold tracking-widest uppercase hover:bg-gray-200 transition-all active:scale-95 flex-1 sm:flex-none">
                SYNC
            </button>

            <button onclick="lockStation()" class="h-11 w-11 shrink-0 rounded-xl sm:rounded-full bg-surface hover:bg-white/5 flex items-center justify-center text-white/40 hover:text-white transition-colors border border-white/5 ml-auto sm:ml-1">
                <i class="fa-solid fa-lock"></i>
            </button>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // --- 1. CORE ENGINE SETUP ---
        const supabaseUrl = 'https://pmhmuzctbstrhtmwxlay.supabase.co';
        const supabaseKey = 'sb_publishable_8dtRYPrztDbEt3bZhU3ibQ_5PAt_FsP';
        const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

        let currentUser = null;
        let currentPin = '';
        let activePeekId = null;
        let rosterNames = [];

        async function loadRoster() {
            const { data } = await supabaseClient.from('floor_users').select('name').eq('status', 'Active');
            if (!data) return;
            const dropdown = document.getElementById('pulseTL');
            const datalist = document.getElementById('rosterList');
            rosterNames = data.map(u => u.name);
            data.forEach(user => {
                dropdown.insertAdjacentHTML('beforeend', `<option value="${user.name}">${user.name}</option>`);
                datalist.insertAdjacentHTML('beforeend', `<option value="${user.name}">`);
            });
        }
        loadRoster();

        document.getElementById('pulseTarget').addEventListener('input', (e) => {
            if (rosterNames.includes(e.target.value)) document.getElementById('pulseTL').value = e.target.value;
        });

        document.querySelectorAll('.pin-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                if(currentPin.length < 4) {
                    currentPin += e.currentTarget.getAttribute('data-val');
                    updatePinDots();
                    if(currentPin.length === 4) verifyPin();
                }
            });
        });

        document.querySelector('.pin-clear').addEventListener('click', () => { 
            currentPin = ''; 
            updatePinDots(); 
        });

        function updatePinDots() {
            for(let i=1; i<=4; i++) {
                const dot = document.getElementById(`dot-${i}`);
                if(i <= currentPin.length) dot.classList.replace('bg-white', 'bg-white'); // keep filled style simple
                else dot.classList.replace('bg-white', 'bg-black');
            }
        }

        async function verifyPin() {
            const { data, error } = await supabaseClient.from('floor_users').select('*').eq('pin', currentPin).single();
            if (data) {
                currentUser = data;
                document.getElementById('lockScreen').classList.add('opacity-0', 'pointer-events-none');
                document.getElementById('activeUserName').innerText = data.name;
                document.getElementById('activeUserRole').innerText = data.role;
                showToast('SYSTEM', `Authorized`);
                loadBoard();
            } else {
                document.getElementById('pinError').style.opacity = '1';
                setTimeout(() => { currentPin = ''; updatePinDots(); document.getElementById('pinError').style.opacity = '0'; }, 1000);
            }
        }

        function lockStation() {
            currentUser = null;
            currentPin = '';
            updatePinDots();
            document.getElementById('lockScreen').classList.remove('opacity-0', 'pointer-events-none');
        }

        supabaseClient.channel('custom-all-channel')
            .on('postgres_changes', { event: '*', schema: 'public', table: 'pulses' }, payload => {
                if (currentUser) { loadBoard(); }
            }).subscribe();

        async function loadBoard() {
            const { data } = await supabaseClient.from('pulses').select('*').order('id', { ascending: false });
            if (!data) return;

            document.getElementById('col-Radar').innerHTML = '';
            document.getElementById('col-Assigned To').innerHTML = '';
            document.getElementById('col-In Progress').innerHTML = '';
            document.getElementById('col-Completed').innerHTML = '';

            let counts = { 'Radar': 0, 'Assigned To': 0, 'In Progress': 0, 'Completed': 0 };

            data.forEach(item => {
                const colElement = document.getElementById(`col-${item.status}`);
                if(colElement) {
                    if (counts[item.status] !== undefined) counts[item.status]++;

                    const borderClass = item.priority === 'Critical' ? 'border-red-500/50' : 'border-white/10';
                    const tagClass = item.assigned_to !== 'None' ? `bg-white text-black` : `bg-surface border border-white/10 text-white/60`;
                    const hasNotes = item.notes && item.notes.trim() !== '' ? `<i class="fa-regular fa-comment-dots text-white/40 text-[10px] ml-2"></i>` : '';
                    
                    const cardHTML = `
                        <div id="card-${item.id}" draggable="true" ondragstart="drag(event)" onclick="openPeek('${item.id}')" class="glass-card rounded-xl p-4 relative cursor-pointer ${borderClass}">
                            <div class="flex justify-between items-start mb-3">
                                <span class="text-[9px] font-bold tracking-widest px-2 py-0.5 rounded ${tagClass}">${item.assigned_to.toUpperCase()}</span>
                                ${item.priority === 'Critical' ? '<i class="fa-solid fa-fire text-red-500 text-[10px]"></i>' : ''}
                            </div>
                            <p class="text-[13px] font-medium text-white/90 mb-3 leading-snug">${item.title} ${hasNotes}</p>
                            <div class="flex justify-between items-center">
                                <span class="text-[10px] text-white/40 font-mono">${item.linked_entity}</span>
                            </div>
                        </div>
                    `;
                    colElement.insertAdjacentHTML('beforeend', cardHTML);
                }
            });

            ['Radar', 'Assigned To', 'In Progress', 'Completed'].forEach(status => {
                if(counts[status] === 0) {
                    document.getElementById(`col-${status}`).innerHTML = `<div class="border border-dashed border-white/5 rounded-xl h-24 flex items-center justify-center text-[10px] uppercase tracking-widest text-white/20 font-medium">Clear</div>`;
                }
            });

            document.getElementById('count-Radar').innerText = counts['Radar'];
            document.getElementById('count-Assigned To').innerText = counts['Assigned To'];
            document.getElementById('count-In Progress').innerText = counts['In Progress'];
        }

        function drag(ev) { ev.dataTransfer.setData("text", ev.target.id); ev.target.classList.add('dragging'); }
        function allowDrop(ev) { ev.preventDefault(); ev.currentTarget.classList.add('drag-over'); }
        function dragLeave(ev) { ev.currentTarget.classList.remove('drag-over'); }

        async function drop(ev, newStatus) {
            ev.preventDefault();
            ev.currentTarget.classList.remove('drag-over');
            const dataId = ev.dataTransfer.getData("text");
            const dbId = dataId.replace('card-', '');
            await supabaseClient.from('pulses').update({ status: newStatus }).eq('id', dbId);
        }

        document.getElementById('executeBtn').addEventListener('click', async () => {
            const btn = document.getElementById('executeBtn');
            const title = document.getElementById('pulseTitle').value;
            const target = document.getElementById('pulseTarget').value;
            const tl = document.getElementById('pulseTL').value;
            const priority = document.getElementById('pulsePriority').value;

            if(!title) { alert("Title is required."); return; }

            btn.innerText = "...";
            const initialStatus = tl !== 'None' ? 'Assigned To' : 'Radar';

            const { error } = await supabaseClient.from('pulses').insert([{ 
                title: title, linked_entity: target || 'Unspecified', 
                assigned_to: tl, priority: priority, status: initialStatus 
            }]);

            if (error) { alert("ERROR: " + error.message); btn.innerText = "SYNC"; return; }

            document.getElementById('pulseTitle').value = '';
            document.getElementById('pulseTarget').value = '';
            document.getElementById('pulseTL').value = 'None';
            btn.innerText = "SYNC";
            
            showToast(`Sent`, `Task Synced`);
            loadBoard();
        });

        async function openPeek(id) {
            activePeekId = id;
            const { data } = await supabaseClient.from('pulses').select('*').eq('id', id).single();
            if(data) {
                document.getElementById('peekTitle').innerText = data.title;
                document.getElementById('peekEntity').innerText = `#${data.linked_entity}`;
                document.getElementById('peekNotes').value = data.notes || '';
                document.getElementById('peekDrawer').classList.add('drawer-open');
            }
        }
        function closePeek() {
            activePeekId = null;
            document.getElementById('peekDrawer').classList.remove('drawer-open');
        }

        document.getElementById('commitNoteBtn').addEventListener('click', async () => {
            if(!activePeekId) return;
            const text = document.getElementById('peekNotes').value;
            await supabaseClient.from('pulses').update({ notes: text }).eq('id', activePeekId);
            showToast('Saved', 'Notes updated.');
            loadBoard();
            closePeek();
        });

        document.getElementById('archiveBtn').addEventListener('click', async () => {
            if(!activePeekId) return;
            await supabaseClient.from('pulses').delete().eq('id', activePeekId);
            showToast('Archived', 'Task deleted.');
            closePeek();
            loadBoard();
        });

        function showToast(header, msg) {
            const toast = document.getElementById('toastAlert');
            document.getElementById('toastHeader').innerText = header;
            document.getElementById('toastMessage').innerText = msg;
            toast.classList.remove('translate-x-[150%]');
            setTimeout(() => toast.classList.add('translate-x-[150%]'), 3000);
        }

        setInterval(() => {
            const now = new Date();
            if ((now.getHours() === 6 || now.getHours() === 14 || now.getHours() === 22) && now.getMinutes() === 0) {
                executeShiftPurge();
            }
        }, 60000);

        async function executeShiftPurge() {
            const blackout = document.getElementById('shiftBlackout');
            blackout.classList.remove('opacity-0', 'pointer-events-none');
            await supabaseClient.from('pulses').delete().eq('status', 'Completed');
            setTimeout(() => { blackout.classList.add('opacity-0', 'pointer-events-none'); loadBoard(); }, 3000);
        }
    </script>
</body>
</html>
